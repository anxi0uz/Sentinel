openapi: 3.0.0
info:
  title: Transaction Gateway
  version: 1.0.0

paths:
  /transactions:
    post:
      summary: Submit a transaction
      operationId: submitTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequest"
      responses:
        "202":
          description: Transaction accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    TransactionRequest:
      type: object
      required:
        - user_id
        - amount
        - currency
        - ip
        - country
      properties:
        user_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        ip:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
