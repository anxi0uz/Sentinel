networks:
  default:
    name: SentinelNetwork
    external: true

services:
  zookeeper:
    image: docker.io/confluentinc/cp-zookeeper:latest
    container_name: sentinel-zookeeper
    networks:
      - default
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: docker.io/confluentinc/cp-kafka:latest
    container_name: sentinel-kafka
    networks:
      - default
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: docker.io/library/postgres:latest
    container_name: sentinel-postgres
    networks:
      - default
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${SENTINEL_DATABASE_USER}
      POSTGRES_PASSWORD: ${SENTINEL_DATABASE_PASSWORD}
      POSTGRES_DB: ${SENTINEL_DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SENTINEL_DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
